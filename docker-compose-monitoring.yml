version: '3.8'
services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus2
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana2
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
